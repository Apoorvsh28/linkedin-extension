services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: lgx
      POSTGRES_PASSWORD: lgx
      POSTGRES_DB: leadsdb
    ports:
      - "5432:5432"
    volumes:
      - lgx_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lgx -d leadsdb"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: .
      dockerfile: packages/backend/Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://lgx:lgx@postgres:5432/leadsdb
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      PORT: 5000
    ports:
      - "5000:5000"
    command: sh -c "pnpm prisma:migrate:deploy && pnpm dev"
    volumes:
      - ./packages/backend/src:/app/packages/backend/src
      - ./packages/backend/prisma:/app/packages/backend/prisma
      - ./packages/shared/src:/app/packages/shared/src
      - lgx_backend_node_modules:/app/node_modules

volumes:
  lgx_postgres_data:
  lgx_backend_node_modules:
