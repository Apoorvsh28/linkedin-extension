services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: lgx
      POSTGRES_PASSWORD: lgx
      POSTGRES_DB: leadsdb
    ports:
      - "5432:5432"
    volumes:
      - lgx_postgres_data:/var/lib/postgresql/data

volumes:
  lgx_postgres_data:
